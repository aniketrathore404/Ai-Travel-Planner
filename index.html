<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --deep-ocean: #003b5c;
        --aqua: #0ea5e9;
        --turquoise: #2dd4bf;
        --sand: #fdf6e3;
        --mist: #f0f9ff;
        --coral: #fb7185;
      }
      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #e0f2fe 0%, #ccfbf1 50%, #fefce8 100%);
        background-attachment: fixed;
        color: var(--deep-ocean);
        margin: 0;
        overflow-x: hidden;
      }
      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .ui-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 20px 50px rgba(0, 59, 92, 0.1);
        border-radius: 1.5rem;
      }
      .text-gradient {
        background: linear-gradient(to right, var(--deep-ocean), var(--aqua));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      /* Wave Animation */
      .ocean-wave {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 15vh;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%230ea5e9" fill-opacity="0.1" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,213.3C672,224,768,224,864,197.3C960,171,1056,117,1152,101.3C1248,85,1344,107,1392,117.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
        background-size: 1440px 320px;
        z-index: -1;
        animation: waveMove 20s linear infinite;
      }
      @keyframes waveMove {
        from { background-position-x: 0; }
        to { background-position-x: 1440px; }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
        "@google/genai": "https://esm.sh/@google/genai@^1.15.0",
        "react/": "https://esm.sh/react@^19.1.1/",
        "react": "https://esm.sh/react@^19.1.1"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div class="ocean-wave"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
